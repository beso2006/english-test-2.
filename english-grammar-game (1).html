<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة قواعد اللغة الإنجليزية 🎉</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mada:wght@400;600;700&display=swap');

:root{
  --yellow:#FFD93D;
  --yellow-dark:#E6B800;
  --blue:#54C5F8;
  --blue-dark:#2BA3D6;
  --pink:#FF9EBB;
  --pink-dark:#E5708F;
  --green:#7ED957;
  --green-dark:#4FAE2A;
  --red:#FF7A7A;
  --red-dark:#E25555;
  --purple:#B28DFF;
  --purple-dark:#8A63E0;
  --orange:#FFB76B;
  --orange-dark:#E89A3C;
  --teal:#8CE5C9;
  --teal-dark:#54B596;
  --dark:#2D2A4A;
  --cream:#FFF8EC;
  --gray:#F0EEF6;
}

*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

body{
  margin:0;
  min-height:100vh;
  font-family:'Mada','Baloo 2',sans-serif;
  background: linear-gradient(135deg, #FFE8B0 0%, #C9F0FF 45%, #FFD3E8 100%);
  background-size: 200% 200%;
  animation: bgShift 18s ease infinite;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  color:var(--dark);
}
@keyframes bgShift{
  0%{background-position:0% 0%;}
  50%{background-position:100% 100%;}
  100%{background-position:0% 0%;}
}

h1,h2,h3,.btn,.score-pill,.progress-text{font-family:'Baloo 2',sans-serif;}

#app{
  width:100%;
  max-width:640px;
}

.screen{display:none;}
.screen.active{display:block; animation: popIn .35s ease;}

@keyframes popIn{
  from{opacity:0; transform: scale(.92) translateY(10px);}
  to{opacity:1; transform: scale(1) translateY(0);}
}

/* ===== Home screen ===== */
.home-card{
  background:var(--cream);
  border-radius:32px;
  border:5px solid var(--dark);
  box-shadow: 0 10px 0 rgba(45,42,74,.18);
  padding:28px 22px;
  text-align:center;
}
.home-title{
  font-size:1.9rem;
  font-weight:800;
  margin:0 0 6px;
  color:var(--dark);
}
.home-sub{
  font-size:1rem;
  margin:0 0 22px;
  color:#6b6680;
  font-weight:600;
}
.category-list{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.category-card{
  border:4px solid var(--dark);
  border-radius:22px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  text-align:right;
  font-weight:700;
  font-size:1.05rem;
  transition: transform .12s ease, box-shadow .12s ease;
  box-shadow: 0 6px 0 rgba(45,42,74,.18);
  background:#fff;
}
.category-card:hover{transform: translateY(-3px);}
.category-card:active{transform: translateY(3px); box-shadow:0 2px 0 rgba(45,42,74,.18);}
.category-card.c1{background:var(--blue);}
.category-card.c2{background:var(--yellow);}
.category-card.c3{background:var(--pink);}
.category-card.c4{background:var(--purple);}
.category-card.c5{background:var(--orange);}
.category-card.c6{background:var(--teal);}
.category-emoji{font-size:2.1rem; flex-shrink:0;}
.category-text{flex:1;}
.category-title{font-size:1.15rem; font-weight:800; margin-bottom:2px;}
.category-count{font-size:.85rem; font-weight:600; opacity:.75;}

/* ===== Quiz screen ===== */
.quiz-card{
  background:var(--cream);
  border-radius:32px;
  border:5px solid var(--dark);
  box-shadow: 0 10px 0 rgba(45,42,74,.18);
  padding:24px 20px;
}
.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  gap:10px;
}
.cat-label{
  font-weight:800;
  font-size:.95rem;
  background:var(--purple);
  color:#fff;
  border:3px solid var(--dark);
  border-radius:14px;
  padding:6px 12px;
}
.score-pill{
  font-weight:800;
  font-size:.95rem;
  background:var(--green);
  border:3px solid var(--dark);
  border-radius:14px;
  padding:6px 12px;
}
.progress-track{
  background:#E5E1F5;
  border:3px solid var(--dark);
  border-radius:16px;
  height:18px;
  overflow:hidden;
  margin-bottom:6px;
}
.progress-fill{
  height:100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius:16px 0 0 16px;
  transition: width .35s ease;
}
.progress-text{
  text-align:center;
  font-weight:700;
  font-size:.85rem;
  color:#6b6680;
  margin-bottom:16px;
}

.question-box{
  background:#fff;
  border:4px solid var(--dark);
  border-radius:22px;
  padding:20px 18px;
  margin-bottom:18px;
  direction:ltr;
  text-align:center;
}
.question-text{
  font-size:1.25rem;
  font-weight:700;
  line-height:1.7;
  color:var(--dark);
  margin:0;
}
.blank{
  display:inline-block;
  min-width:54px;
  border-bottom:3px dashed var(--purple-dark);
  font-weight:800;
  color:var(--purple-dark);
}

.options-grid{
  direction:ltr;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:14px;
}
.options-grid.single-col{grid-template-columns:1fr;}
.options-grid.many-options{grid-template-columns:repeat(2,1fr);}
.options-grid.many-options .option-btn:last-child:nth-child(odd){grid-column: 1 / -1;}

.option-btn{
  font-family:'Baloo 2','Mada',sans-serif;
  border:4px solid var(--dark);
  border-radius:18px;
  background:#fff;
  padding:14px 10px;
  font-size:1.05rem;
  font-weight:700;
  cursor:pointer;
  box-shadow: 0 5px 0 rgba(45,42,74,.18);
  transition: transform .12s ease, box-shadow .12s ease, background .25s ease, color .25s ease;
  color:var(--dark);
  text-align:center;
  direction:ltr;
}
.option-btn:hover:not(:disabled){
  transform: translateY(-2px);
  background:var(--gray);
}
.option-btn:active:not(:disabled){
  transform: translateY(3px);
  box-shadow:0 1px 0 rgba(45,42,74,.18);
}
.option-btn:disabled{cursor:default;}
.option-btn.correct{
  background:var(--green);
  color:#fff;
  animation: bounceCorrect .5s ease;
  box-shadow: 0 5px 0 var(--green-dark);
}
.option-btn.wrong{
  background:var(--red);
  color:#fff;
  animation: shake .4s ease;
  box-shadow: 0 5px 0 var(--red-dark);
}
.option-btn.dim{opacity:.45;}

@keyframes bounceCorrect{
  0%{transform:scale(1);}
  40%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}

.feedback-box{
  display:none;
  border:4px solid var(--dark);
  border-radius:18px;
  padding:14px 16px;
  margin-bottom:14px;
  font-weight:700;
  font-size:.98rem;
  line-height:1.8;
  direction:rtl;
  text-align:right;
  animation: popIn .3s ease;
}
.feedback-box.show{display:block;}
.feedback-box.correct-fb{background:#E6FBE0; border-color:var(--green-dark);}
.feedback-box.wrong-fb{background:#FFEDED; border-color:var(--red-dark);}
.feedback-title{font-size:1.1rem; margin-bottom:6px; display:block;}

.nav-row{
  display:flex;
  gap:12px;
}
.btn{
  flex:1;
  font-family:'Baloo 2',sans-serif;
  font-weight:800;
  font-size:1rem;
  padding:14px 10px;
  border:4px solid var(--dark);
  border-radius:18px;
  cursor:pointer;
  box-shadow: 0 5px 0 rgba(45,42,74,.18);
  transition: transform .12s ease, box-shadow .12s ease, opacity .2s ease;
  background:var(--blue);
  color:var(--dark);
}
.btn:active:not(:disabled){transform: translateY(3px); box-shadow:0 1px 0 rgba(45,42,74,.18);}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn.primary{background:var(--green);}
.btn.warm{background:var(--yellow);}
.btn.home-btn{background:var(--pink); flex:none; padding:14px 18px;}

/* ===== Result screen ===== */
.result-card{
  background:var(--cream);
  border-radius:32px;
  border:5px solid var(--dark);
  box-shadow: 0 10px 0 rgba(45,42,74,.18);
  padding:32px 22px;
  text-align:center;
}
.result-emoji{font-size:4rem; margin-bottom:8px;}
.result-title{font-size:1.6rem; font-weight:800; margin:0 0 6px;}
.result-score{
  font-size:2.4rem;
  font-weight:800;
  color:var(--purple-dark);
  margin:6px 0 4px;
}
.result-msg{font-size:1rem; font-weight:600; color:#6b6680; margin-bottom:24px;}
.result-actions{display:flex; flex-direction:column; gap:12px;}

/* ===== Confetti ===== */
.confetti-piece{
  position:fixed;
  top:-20px;
  width:10px;
  height:16px;
  z-index:999;
  pointer-events:none;
  border-radius:3px;
  animation-name: fall;
  animation-timing-function: ease-in;
  animation-fill-mode: forwards;
}
@keyframes fall{
  to{
    transform: translateY(110vh) rotate(540deg);
    opacity:.9;
  }
}

@media (max-width:420px){
  .options-grid{grid-template-columns:1fr;}
  .question-text{font-size:1.1rem;}
  .home-title{font-size:1.5rem;}
}
</style>
</head>
<body>

<div id="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="home-screen">
    <div class="home-card">
      <div style="font-size:2.6rem; margin-bottom:6px;">🎮📚</div>
      <h1 class="home-title">لعبة قواعد اللغة الإنجليزية</h1>
      <p class="home-sub">اختر التحدي الذي تريد لعبه وابدأ المتعة! 🌟</p>
      <div class="category-list" id="category-list"></div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quiz-screen">
    <div class="quiz-card">
      <div class="top-bar">
        <span class="cat-label" id="cat-label">📘</span>
        <span class="score-pill" id="score-pill">⭐ 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>

      <div class="question-box">
        <p class="question-text" id="question-text"></p>
      </div>

      <div class="options-grid" id="options-grid"></div>

      <div class="feedback-box" id="feedback-box">
        <span class="feedback-title" id="feedback-title"></span>
        <span id="feedback-text"></span>
      </div>

      <div class="nav-row">
        <button class="btn home-btn" id="home-btn-quiz" title="القائمة الرئيسية">🏠</button>
        <button class="btn" id="prev-btn">⬅️ السابق</button>
        <button class="btn primary" id="next-btn" disabled>التالي ➡️</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="result-screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <h2 class="result-title" id="result-title">أنت بطل!</h2>
      <div class="result-score" id="result-score">0 / 0</div>
      <p class="result-msg" id="result-msg"></p>
      <div class="result-actions">
        <button class="btn primary" id="retry-btn">🔁 العب مرة أخرى</button>
        <button class="btn warm" id="menu-btn">🏠 القائمة الرئيسية</button>
      </div>
    </div>
  </div>

</div>

<script>
/* =========================================================
   DATA — جاهز لإضافة أو تعديل الأسئلة بسهولة
   كل عنصر: { q: نص السؤال (استخدم [1] و[2] للفراغات إن وجدت),
              options: [قائمة الخيارات],
              correct: رقم الإجابة الصحيحة (يبدأ من 0),
              explain: شرح بالعربية }
========================================================= */
const questionsData = {

  forSince: {
    title: "For & Since",
    emoji: "⏳",
    cssClass: "c1",
    questions: [
      {q:"I have been living in New York [____] 1 year.", options:["for","since"], correct:0, explain:"نستخدم <b>for</b> مع مدة زمنية محددة (1 year)، أما <b>since</b> فتُستخدم مع نقطة زمنية محددة في الماضي (مثل: 2003، last week)."},
      {q:"I haven't seen you [____] a week.", options:["for","since"], correct:0, explain:"نستخدم <b>for</b> مع المدة (a week)، بينما <b>since</b> تحتاج إلى نقطة بداية محددة."},
      {q:"I have been waiting [____] 12:30.", options:["for","since"], correct:1, explain:"12:30 هي نقطة زمنية محددة (بداية الانتظار)، لذلك نستخدم <b>since</b>، أما <b>for</b> فتُستخدم مع المدة."},
      {q:"I've lived here [____] 5 years.", options:["for","since"], correct:0, explain:"5 years مدة زمنية، فالإجابة الصحيحة <b>for</b>."},
      {q:"I've lived here [____] 2003.", options:["for","since"], correct:1, explain:"2003 نقطة زمنية محددة في الماضي، فنستخدم <b>since</b>."},
      {q:"[____] she came here I've been very nervous.", options:["For","Since"], correct:1, explain:"الجملة 'she came here' تمثل نقطة بداية في الماضي، فنستخدم <b>since</b> + جملة."},
      {q:"She has been married [____] ten years.", options:["for","since"], correct:0, explain:"ten years مدة زمنية، فنستخدم <b>for</b>."},
      {q:"She has been a doctor [____] 1998.", options:["for","since"], correct:1, explain:"1998 نقطة زمنية محددة، فنستخدم <b>since</b>."},
      {q:"I have been living in Valencia [____] last June.", options:["for","since"], correct:1, explain:"last June نقطة زمنية محددة في الماضي (بداية الإقامة)، فنستخدم <b>since</b>."},
      {q:"I haven't seen you [____] last week.", options:["for","since"], correct:1, explain:"last week هنا تُستخدم كنقطة بداية محددة، فالإجابة <b>since</b>."},
      {q:"Yesterday I studied [____] three hours.", options:["for","since"], correct:0, explain:"three hours مدة زمنية، فنستخدم <b>for</b> (حتى مع أفعال الماضي البسيط)."},
      {q:"She has been studying English [____] two months.", options:["for","since"], correct:0, explain:"two months مدة زمنية، فنستخدم <b>for</b>."},
      {q:"She has been studying English [____] last January.", options:["for","since"], correct:1, explain:"last January نقطة زمنية محددة في الماضي، فنستخدم <b>since</b>."},
      {q:"She has been studying English [____] 12.00.", options:["for","since"], correct:1, explain:"12.00 نقطة زمنية محددة (وقت محدد)، فنستخدم <b>since</b>."},
      {q:"She has been studying English [____] your birthday.", options:["for","since"], correct:1, explain:"your birthday نقطة زمنية محددة (يوم معيّن)، فنستخدم <b>since</b>."},
      {q:"She has been studying English [____] two hours.", options:["for","since"], correct:0, explain:"two hours مدة زمنية، فنستخدم <b>for</b>."},
      {q:"She has been studying English [____] six minutes.", options:["for","since"], correct:0, explain:"six minutes مدة زمنية، فنستخدم <b>for</b>."},
      {q:"She has been studying English [____] a long time.", options:["for","since"], correct:0, explain:"a long time تعبير عن مدة زمنية، فنستخدم <b>for</b>."},
      {q:"I've been working here [____] the last two years.", options:["for","since"], correct:0, explain:"the last two years مدة زمنية، فنستخدم <b>for</b>."},
      {q:"I have loved you [____] the first time I saw you.", options:["for","since"], correct:1, explain:"'the first time I saw you' نقطة بداية محددة في الماضي، فنستخدم <b>since</b>."}
    ]
  },

  pastSimple: {
    title: "Past Simple",
    emoji: "🕰️",
    cssClass: "c2",
    questions: [
      {q:"He [1]____ out his wallet and [2]____ the bill.", options:["took / paid","paid / took","gave / paid","took / gave"], correct:0, explain:"أخرج محفظته أولاً (<b>took</b> out) ثم دفع الفاتورة (<b>paid</b>). الترتيب المنطقي للأحداث هو: took ثم paid."},
      {q:"When she [1]____ to the interview, she [2]____ her best outfit.", options:["wore / went","went / wore","went / won","drove / wore"], correct:1, explain:"ذهبت إلى المقابلة (<b>went</b>) وكانت ترتدي (<b>wore</b>) أفضل ملابسها. go ماضيها went، و wear ماضيها wore."},
      {q:"They [1]____ the motorway and [2]____ for an hour on quiet country roads.", options:["drove / left","left / drove","took / drove","left / took"], correct:1, explain:"تركوا الطريق السريع (<b>left</b> the motorway) ثم قادوا (<b>drove</b>) لمدة ساعة. leave ماضيها left، و drive ماضيها drove."},
      {q:"I [1]____ I [2]____ this theory but now I'm not so sure.", options:["understood / thought","knew / thought","thought / understood","thought / knew"], correct:2, explain:"كنت أعتقد (<b>thought</b>) أنني أفهم (<b>understood</b>) هذه النظرية، لكنني الآن غير متأكد. think ماضيها thought، و understand ماضيها understood."},
      {q:"As soon as I [1]____ her, I [2]____ she was the woman I was going to marry.", options:["knew / met","met / thought","met / knew","saw / knew"], correct:2, explain:"بمجرد أن قابلتها (<b>met</b>)، عرفت (<b>knew</b>) أنها المرأة التي سأتزوجها. meet ماضيها met، و know ماضيها knew."},
      {q:"He [1]____ fourteen novels, but not one of them [2]____ a prize.", options:["won / wrote","wrote / built","wrote / cost","wrote / won"], correct:3, explain:"كتب (<b>wrote</b>) أربع عشرة رواية، لكن لم تفز (<b>won</b>) أي منها بجائزة. write ماضيها wrote، و win ماضيها won."},
      {q:"They [1]____ their own house, so it [2]____ them much less.", options:["cost / built","built / won","bought / cost","built / cost"], correct:3, explain:"بنوا (<b>built</b>) منزلهم الخاص، لذلك كلّفهم (<b>cost</b>) أقل بكثير. build ماضيها built، و cost تبقى cost في الماضي."},
      {q:"When I [1]____ you were coming, I [2]____ the staff the rest of the day off.", options:["gave / heard","heard / took","knew / gave","heard / gave"], correct:3, explain:"عندما سمعت (<b>heard</b>) أنك قادم، أعطيت (<b>gave</b>) الموظفين بقية اليوم عطلة. hear ماضيها heard، و give ماضيها gave."},
      {q:"The nurse [1]____ the patient's hand and [2]____ softly to him.", options:["spoke / held","held / heard","took / spoke","held / spoke"], correct:3, explain:"أمسكت الممرضة (<b>held</b>) بيد المريض وتحدثت (<b>spoke</b>) إليه بلطف. hold ماضيها held، و speak ماضيها spoke."},

      {q:"She ____ (go) to Australia in 1994 and she liked it very much.", options:["went","goes","is going","gone"], correct:0, explain:"عبارة 'in 1994' تدل على زمن ماضٍ محدد، وفعل go الشاذ في الماضي هو <b>went</b>."},
      {q:"The dog ____ (eat) its toy last night.", options:["eats","eating","ate","eaten"], correct:2, explain:"'last night' تدل على الماضي، وفعل eat الشاذ في الماضي هو <b>ate</b>."},
      {q:"The policeman ____ (talk) to the burglar yesterday.", options:["talks","is talking","will talk","talked"], correct:3, explain:"'yesterday' تدل على الماضي، وفعل talk فعل منتظم فنضيف -ed لتصبح <b>talked</b>."},
      {q:"____ you have a test last week?", options:["Do you have","Have you had","Did you have","Had you have"], correct:2, explain:"مع 'last week' وفي صيغة السؤال بالماضي البسيط نستخدم <b>Did</b> + الفاعل + الفعل في صورته الأساسية: Did you have."},
      {q:"The gentleman ____ (speak) to his servant 2 hours ago.", options:["speaks","speaking","speaked","spoke"], correct:3, explain:"'2 hours ago' تدل على الماضي، وفعل speak الشاذ في الماضي هو <b>spoke</b>."},
      {q:"The man ____ (drive) to the supermarket last weekend.", options:["drives","driving","drived","drove"], correct:3, explain:"'last weekend' تدل على الماضي، وفعل drive الشاذ في الماضي هو <b>drove</b>."},
      {q:"My brothers ____ (leave) for England last week.", options:["leaves","leaving","leaved","left"], correct:3, explain:"'last week' تدل على الماضي، وفعل leave الشاذ في الماضي هو <b>left</b>."},

      {q:"I ____ (go) to the cinema last night.", options:["go","gone","went","going"], correct:2, explain:"'last night' تدل على الماضي، وفعل go الشاذ في الماضي هو <b>went</b>."},

/* ========================= ENGINE ========================= */
let state = {
  category: null,
  index: 0,
  score: 0,
  answers: []
};

const homeScreen = document.getElementById('home-screen');
const quizScreen = document.getElementById('quiz-screen');
const resultScreen = document.getElementById('result-screen');
const categoryList = document.getElementById('category-list');

const catLabel = document.getElementById('cat-label');
const scorePill = document.getElementById('score-pill');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const questionText = document.getElementById('question-text');
const optionsGrid = document.getElementById('options-grid');
const feedbackBox = document.getElementById('feedback-box');
const feedbackTitle = document.getElementById('feedback-title');
const feedbackText = document.getElementById('feedback-text');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function showScreen(screen){
  [homeScreen, quizScreen, resultScreen].forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
}

/* Build home screen category cards */
function buildHome(){
  categoryList.innerHTML = '';
  Object.keys(questionsData).forEach(key => {
    const cat = questionsData[key];
    const card = document.createElement('div');
    card.className = 'category-card ' + cat.cssClass;
    card.innerHTML = `
      <div class="category-emoji">${cat.emoji}</div>
      <div class="category-text">
        <div class="category-title">${cat.title}</div>
        <div class="category-count">${cat.questions.length} سؤال • اضغط للبدء</div>
      </div>
      <div style="font-size:1.5rem;">▶️</div>
    `;
    card.addEventListener('click', () => startQuiz(key));
    categoryList.appendChild(card);
  });
}

function startQuiz(key){
  state.category = key;
  state.index = 0;
  state.score = 0;
  state.answers = new Array(questionsData[key].questions.length).fill(null);
  catLabel.textContent = questionsData[key].emoji + ' ' + questionsData[key].title;
  showScreen(quizScreen);
  renderQuestion();
}

function renderQuestion(){
  const cat = questionsData[state.category];
  const q = cat.questions[state.index];
  const total = cat.questions.length;

  // progress
  progressFill.style.width = ((state.index) / total * 100) + '%';
  progressText.textContent = `السؤال ${state.index + 1} من ${total}`;
  scorePill.textContent = `⭐ ${state.score}`;

  // question text -> highlight blanks
  let formatted = q.q.replace(/\[(.*?)\]/g, (m, inner) => {
    return `<span class="blank">${inner === '____' ? '____' : inner}</span>`;
  });
  questionText.innerHTML = formatted;

  // options
  optionsGrid.innerHTML = '';
  optionsGrid.className = 'options-grid' + (q.options.length >= 5 ? ' many-options' : (q.options.some(o => o.length > 14) ? ' single-col' : ''));
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(i));
    optionsGrid.appendChild(btn);
  });

  // feedback
  feedbackBox.classList.remove('show', 'correct-fb', 'wrong-fb');
  feedbackText.innerHTML = '';

  // restore previous answer if revisiting
  const prevAnswer = state.answers[state.index];
  if(prevAnswer !== null){
    lockOptions(prevAnswer, q, false);
  }

  // nav buttons
  prevBtn.disabled = state.index === 0;
  nextBtn.disabled = prevAnswer === null;
  nextBtn.textContent = state.index === total - 1 ? 'النتيجة 🏁' : 'التالي ➡️';
}

function selectAnswer(selectedIndex){
  if(state.answers[state.index] !== null) return; // already answered

  const cat = questionsData[state.category];
  const q = cat.questions[state.index];
  state.answers[state.index] = selectedIndex;

  const isCorrect = selectedIndex === q.correct;
  if(isCorrect){
    state.score++;
    scorePill.textContent = `⭐ ${state.score}`;
    launchConfetti();
    showFeedback(true, q);
  } else {
    showFeedback(false, q);
  }

  lockOptions(selectedIndex, q, true);
  nextBtn.disabled = false;
}

function lockOptions(selectedIndex, q, animate){
  const buttons = optionsGrid.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.correct){
      btn.classList.add('correct');
    }
    if(i === selectedIndex && selectedIndex !== q.correct){
      btn.classList.add('wrong');
    }
    if(i !== q.correct && i !== selectedIndex){
      btn.classList.add('dim');
    }
  });
  if(!animate){
    // show feedback again without re-triggering confetti
    showFeedback(selectedIndex === q.correct, q);
  }
}

function showFeedback(isCorrect, q){
  feedbackBox.classList.add('show');
  if(isCorrect){
    feedbackBox.classList.add('correct-fb');
    feedbackBox.classList.remove('wrong-fb');
    feedbackTitle.textContent = '🎉 برافو! إجابة صحيحة!';
    feedbackText.innerHTML = q.explain;
  } else {
    feedbackBox.classList.add('wrong-fb');
    feedbackBox.classList.remove('correct-fb');
    feedbackTitle.textContent = '💡 لا بأس، لنتعلم من هذا!';
    feedbackText.innerHTML = q.explain;
  }
}

prevBtn.addEventListener('click', () => {
  if(state.index > 0){
    state.index--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', () => {
  const total = questionsData[state.category].questions.length;
  if(state.index < total - 1){
    state.index++;
    renderQuestion();
  } else {
    showResult();
  }
});

document.getElementById('home-btn-quiz').addEventListener('click', () => {
  showScreen(homeScreen);
});

/* ===== Result screen ===== */
function showResult(){
  const cat = questionsData[state.category];
  const total = cat.questions.length;
  const score = state.score;
  const pct = score / total;

  document.getElementById('result-score').textContent = `${score} / ${total}`;

  let emoji, title, msg;
  if(pct === 1){
    emoji = '🏆🌟'; title = 'أنت بطل حقيقي!';
    msg = 'إجابات مثالية بالكامل! أداء رائع جداً 👏';
    launchConfetti(60);
  } else if(pct >= 0.8){
    emoji = '🎉😄'; title = 'ممتاز جداً!';
    msg = 'كنت قريباً جداً من الكمال، أحسنت!';
    launchConfetti(40);
  } else if(pct >= 0.5){
    emoji = '👍🙂'; title = 'أداء جيد!';
    msg = 'نتيجة جيدة، استمر في التدريب لتصبح أفضل!';
  } else {
    emoji = '💪📚'; title = 'لا بأس، لنحاول مجدداً!';
    msg = 'كل خطوة هي تعلّم. راجع الشرح وأعد المحاولة!';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;

  showScreen(resultScreen);
}

document.getElementById('retry-btn').addEventListener('click', () => {
  startQuiz(state.category);
});

document.getElementById('menu-btn').addEventListener('click', () => {
  showScreen(homeScreen);
});

/* ===== Confetti ===== */
function launchConfetti(amount = 26){
  const colors = ['#FFD93D','#54C5F8','#FF9EBB','#7ED957','#B28DFF','#FF7A7A'];
  for(let i = 0; i < amount; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.8 + Math.random() * 1.6) + 's';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3600);
  }
}

/* ===== Init ===== */
buildHome();
</script>
